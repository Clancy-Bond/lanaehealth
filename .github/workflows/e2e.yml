name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    name: Playwright (mobile WebKit + Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      # The Playwright webServer config (playwright.config.ts) boots
      # `npm run dev` itself with LANAE_REQUIRE_AUTH=false, so we do not
      # need a separate start + wait-on step here.
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3005
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
